spring.application.name=HealthCareHub
server.port=9092

spring.datasource.url=jdbc:mysql://localhost:3306/HealthCare
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

# JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

jwt.secret=${JWT_SECRET}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

mail.template.reset-password-otp=<html><body><h3>Hello {name},</h3><p>Your OTP is <b>{otp}</b></p><p>Valid for 5 minutes.</p></body></html>

assignment.upload.path=C://Uploads//SchoolPEP//assignment//

twilio.account.sid=${TWILIO_SID}
twilio.auth.token=${TWILIO_TOKEN}